version: '2'

run:
  timeout: 5m
  go: '1.26'

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/dynatrace-oss/dtwiz

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gocritic
    - ineffassign
    - unused

  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF*"    # Disable quickfix suggestions (stylistic, not bugs)
        - "-ST1003" # Don't enforce ID naming convention (breaks JSON field mapping)
        - "-S1016"  # Don't require struct conversion shorthand
        # ST1005 (error string conventions) re-enabled — Go convention

    errcheck:
      exclude-functions:
        # Cobra flag registration — panics on error, never fails at runtime
        - "(*github.com/spf13/cobra/Command).MarkFlagRequired"

    gocritic:
      disabled-checks:
        - ifElseChain  # conditions span multiple variables — not convertible to switch

  exclusions:
    presets:
      - comments          # ST1000, ST1020, ST1021, ST1022
      - std-error-handling # errcheck: Close, Flush, Remove(All), print/printf/println, Setenv/Unsetenv, stdout/stderr

    rules:
      # Allow unchecked errors in test code (deferred cleanup, test helpers)
      - path: _test\.go
        linters:
          - errcheck
      # Allow unchecked color library prints (fatih/color — same semantics as fmt.Print*)
      - linters:
          - errcheck
        text: "\\.Println|\\.Printf|\\.Fprintf|\\.Fprintln|\\.Fprint"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
