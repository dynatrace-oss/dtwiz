name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Minimum test coverage percentage required to pass CI.
# Target: gradually increase to 30 -> 40 -> 50.
env:
  COVERAGE_THRESHOLD: 20

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.24.13']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Download dependencies
        run: go mod download

      - name: Verify code compiles
        shell: bash
        run: go build ./...

      - name: Run go vet
        shell: bash
        run: go vet ./...

      - name: Run tests
        shell: bash
        run: make test-coverage COVERAGE_THRESHOLD=$COVERAGE_THRESHOLD

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
