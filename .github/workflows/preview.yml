name: Preview Snapshot

on:
  push:
    branches:
      - '**'
      - '!main'
      - '!release/**'

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      published: ${{ steps.semver.outputs.found }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compute release tag
        id: tag
        run: |
          TAG="snapshot-$(echo "${{ github.ref_name }}" | tr '/' '-')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check for semver tag
        id: semver
        run: |
          if git describe --tags --match "v*" --abbrev=0 > /dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No semver tag reachable — skipping snapshot." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Delete existing pre-release (if any)
        if: steps.semver.outputs.found == 'true'
        run: |
          gh release delete "${{ steps.tag.outputs.tag }}" --yes || true
          git push origin ":refs/tags/${{ steps.tag.outputs.tag }}" || true
          git tag -d "${{ steps.tag.outputs.tag }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove non-semver tags locally
        if: steps.semver.outputs.found == 'true'
        run: git tag -l | (grep -v '^v' || true) | xargs -r git tag -d

      - name: Run GoReleaser snapshot
        if: steps.semver.outputs.found == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture snapshot version
        if: steps.semver.outputs.found == 'true'
        id: version
        run: |
          VERSION=$(ls dist/dtwiz_*_linux_amd64.tar.gz | sed 's|.*dtwiz_\(.*\)_linux_amd64.tar.gz|\1|')
          if [ -z "$VERSION" ]; then
            echo "Error: could not determine snapshot version — no matching artifact found." >&2
            echo "Contents of dist/:" >&2
            ls -la dist/ 2>/dev/null || echo "  dist/ does not exist" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "$VERSION" > dist/version.txt

      - name: Publish pre-release
        if: steps.semver.outputs.found == 'true'
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --prerelease \
            --title "Snapshot: ${{ github.ref_name }}" \
            --notes "Preview snapshot from branch \`${{ github.ref_name }}\`. Not for production use." \
            dist/dtwiz_*_linux_*.tar.gz \
            dist/dtwiz_*_darwin_*.tar.gz \
            dist/dtwiz_*_windows_*.zip \
            dist/version.txt \
            dist/checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-comment:
    needs: snapshot
    if: needs.snapshot.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Find PR for branch
        id: pr
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.repository_owner }}:${{ github.ref_name }}" \
            --json number \
            --jq '.[0].number // empty')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post preview install instructions
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ github.ref_name }}';
            const releaseUrl = '${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.snapshot.outputs.tag }}';
            const body = [
              '## Preview snapshot available',
              '',
              'A snapshot build for this branch has been published. Install it to try out the changes:',
              '',
              '**Linux / macOS**',
              '```sh',
              `DTWIZ_BRANCH="${branch}" source <(curl -sSL https://raw.githubusercontent.com/dynatrace-oss/dtwiz/main/scripts/install.sh)`,
              '```',
              '',
              '**Windows (PowerShell)**',
              '```powershell',
              `$env:DTWIZ_BRANCH="${branch}"; irm https://raw.githubusercontent.com/dynatrace-oss/dtwiz/main/scripts/install.ps1 | iex`,
              '```',
              '',
              '> The snapshot is rebuilt on every push to this branch. Re-run the install command to pick up the latest changes.',
              '',
              '---',
              `<details><summary>ℹ️ Release info</summary>`,
              '',
              `Snapshot release: [${releaseUrl}](${releaseUrl})`,
              '',
              'Artifacts are attached to that release and can be downloaded directly if you prefer manual installation.',
              '</details>',
            ].join('\n');

            const marker = '## Preview snapshot available';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              per_page: 100,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ steps.pr.outputs.number }},
                body,
              });
            }
